# Netlify deployment config for ChatQuest (Next.js 14 App Router).
# The `@netlify/plugin-nextjs` plugin handles SSR, ISR, route handlers,
# middleware, and the App Router automatically — no manual function wiring.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Pin the Node major to match local development.
  NODE_VERSION = "20"
  # Skip Husky / postinstall scripts that aren't needed in CI.
  NPM_FLAGS = "--no-audit --no-fund"
  # Cache Next.js build output between deploys.
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Streaming (SSE) support for /api/chat/stream — keep these unbuffered.
[[headers]]
  for = "/api/chat/stream"
  [headers.values]
    Cache-Control = "no-cache, no-transform"
    X-Accel-Buffering = "no"

# NOTE: Security headers on every response are owned by next.config.mjs's
# `headers()` callback so they apply to every Next.js route — including the
# SSR/Lambda paths that don't go through Netlify's [[headers]] block.

# Generic function timeout. Server Actions, Drizzle queries against Supavisor,
# and Supabase auth signUp can all exceed Netlify's 10s default — bump to 30s
# globally so signup doesn't appear "stuck on Creating…".
[functions."*"]
  timeout = 30

# Long-running requests (RAG indexing, multi-turn chat streaming).
[functions."api/kb/*"]
  timeout = 60

[functions."api/chat/*"]
  timeout = 60

[functions."api/grade/*"]
  timeout = 60
